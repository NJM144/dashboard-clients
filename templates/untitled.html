<!-- 📌 Bloc sélection client + rapport -->
<div class="bg-white p-4 rounded-xl shadow col-span-1" style="min-height: 180px">
  <form method="post" action="/rapport-client">
    <label for="client_select" class="block text-sm font-medium text-gray-700 mb-2">Sélectionnez un client</label>
    <select name="client_nom" id="client_select" class="w-full border border-gray-300 rounded-lg p-2 mb-3">
      {% for client in clients_list %}
        <option value="{{ client }}" {% if client == client_selectionne %}selected{% endif %}>{{ client }}</option>
      {% endfor %}
    </select>
    <button type="submit" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded-lg w-full">
      📝 Afficher le rapport
    </button>
  </form>

  {% if rapport %}
    <div class="mt-4 text-sm text-gray-700 whitespace-pre-wrap">
      <h3 class="font-bold text-gray-800 mb-2">📊 Rapport pour {{ client_selectionne }}</h3>
      {{ rapport }}
    </div>
  {% endif %}
</div>
