<!-- 📌 Bloc rapport client élégant -->
<div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-200 col-span-1">
  <form method="post" action="/rapport-client">
    <label for="client_select" class="block text-sm font-semibold text-gray-800 mb-2">
      👤 Sélectionnez un client
    </label>

    <select name="client_nom" id="client_select" class="w-full border border-gray-300 rounded-md px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-yellow-400">
      {% for client in clients_list %}
        <option value="{{ client }}" {% if client == client_selectionne %}selected{% endif %}>{{ client }}</option>
      {% endfor %}
    </select>

    <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-600 transition-colors duration-200 text-white font-semibold px-4 py-2 rounded-md shadow-sm">
      📝 Afficher le rapport
    </button>
  </form>

  {% if rapport %}
    <div class="mt-6 text-sm text-gray-700 bg-gray-50 border border-gray-200 p-4 rounded-md">
      <h3 class="text-md font-bold text-gray-900 mb-3 border-b pb-2">
        📊 Rapport pour <span class="text-yellow-600">{{ client_selectionne }}</span>
      </h3>
      <pre class="whitespace-pre-wrap font-mono text-gray-800 text-sm leading-relaxed">{{ rapport }}</pre>
    </div>
  {% endif %}
</div>
