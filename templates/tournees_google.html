<!DOCTYPE html>
<html>
<head>
  <title>Carte des tournées</title>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    #map { height: 600px; width: 100%; }
  </style>
</head>
<body>
  <h2>Carte des tournées filtrées</h2>
  <div id="map"></div>

  <script>
    var map = L.map('map').setView([5.35, -4.02], 11); // Centre par défaut : Abidjan

    L.tileLayer('https://{s}.tile.openstreetmap.de/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.heigit.org/">HeiGIT</a>'
    }).addTo(map);

    // Points transmis depuis Flask
    var points = {{ points | tojson }};
    
    points.forEach(function(pt) {
      if (pt.latitude && pt.longitude) {
        L.marker([pt.latitude, pt.longitude])
          .addTo(map)
          .bindPopup(`<strong>Client:</strong> ${pt.client}<br>
                      <strong>Type:</strong> ${pt.type_colis}<br>
                      <strong>Date:</strong> ${pt.date}`);
      }
    });
  </script>
</body>
</html>
